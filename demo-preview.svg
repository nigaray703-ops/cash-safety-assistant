<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Cash Safety Assistant demo preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#071827"/>
      <stop offset="0.55" stop-color="#050b14"/>
      <stop offset="1" stop-color="#020715"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#173454" stop-opacity="0.92"/>
