  <text x="454" y="478" fill="#fbbf24" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="820">-NZ$1,650.00</text>
  <rect x="430" y="534" width="340" height="116" rx="20" fill="url(#card)" stroke="#78beff" stroke-opacity="0.28"/>
  <text x="454" y="571" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="760">钱换时间</text>
