  <text x="430" y="103" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">现金安全助手</text>
  <text x="430" y="133" fill="#b9e6ff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">个人现金缓冲 · 固定收支 · 钱换时间</text>
  <rect x="430" y="158" width="340" height="58" rx="16" fill="#071827" stroke="#78beff" stroke-opacity="0.2"/>
